version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: career_agent
      POSTGRES_PASSWORD: career_agent
      POSTGRES_DB: career_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://career_agent:career_agent@db:5432/career_agent
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # Uncomment to run Celery workers
  # worker:
  #   build: .
  #   env_file:
  #     - .env
  #   depends_on:
  #     - db
  #     - redis
  #   command: celery -A workers.celery_app worker --loglevel=info

volumes:
  pgdata:
